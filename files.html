<template>
    <lightning-card>
        <div class="slds-card_boundary">
            <div class="slds-card__header slds-grid slds-grid_align-spread slds-p-horizontal_small slds-theme_shade">
                <div class="slds-media">
                    <lightning-icon icon-name="standard:document" size="small" class="slds-m-right_small"></lightning-icon>
                    <div class="slds-media__body">
                        <b><h2 class="slds-media slds-media--center slds-has-flexi-truncate">Files ({totalRecords})</h2></b>
                    </div>
                </div>
                <template if:true={showAddFilesButton}>
                    <lightning-button label="Add Files" variant="brand-outline" onclick={handleAddFilesClick}>
                </lightning-button>
            </template>
            </div>
            <div class="slds-card__body slds-border_top slds-p-around_none" >
                <template if:false={files.length}>
                    <p class="slds-text-align_center slds-p-around_medium">No files found</p>
                </template>

                <template if:true={files.length}>
                    <div style="height: 400px; overflow: auto;" class="slds-m-top_none">
                    <lightning-datatable
                        key-field="id"
                        data={files}
                        columns={columns}
                        wrap-text-max-lines="3"
                        sorted-by={sortedBy}
                        sorted-direction={sortedDirection}
                        onsort={handleSort}
                        hide-checkbox-column="true"
                        enable-infinite-loading
                        onloadmore={handleLoadMore}>
                    </lightning-datatable>
                </div>
                    <!--<div class="slds-m-top_medium slds-text-align_center">
                        <p>{loadMoreStatus}</p>
                    </div>-->
                </template>
            </div>
        </div>
    </lightning-card>

    <template if:true={showModal}>
        <section role="dialog" tabindex="-1" aria-labelledby="modal-heading" aria-modal="true" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <h2 id="modal-heading" class="slds-text-heading_medium">Upload Files</h2>
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                        title="Close"
                        onclick={closeModal}>
                        <lightning-icon icon-name="utility:close" size="small"></lightning-icon>
                    </button>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <lightning-combobox
                        name="fileCategory"
                        label="File Category"
                        value={selectedCategory}
                        placeholder="Select Category"
                        options={categoryOptions}
                        onchange={handleCategoryChange}
                        required>
                    </lightning-combobox>
                    <template if:true={showCategoryWarning}>
                        <p class="slds-text-color_error slds-m-top_small">
                            ⚠ Please select a file category before uploading a file.
                        </p>
                    </template>
                    <lightning-file-upload
                        label="Upload File"
                        name="fileUploader"
                        record-id={computedRecordId}
                        disabled={disableFileUpload}
                        onuploadfinished={handleUploadFinished}>
                    </lightning-file-upload>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button label="Cancel" onclick={closeModal}></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
